services:
  roomservice:
    image: ${DOCKER_REGISTRY-}roomservice
    build:
      context: .
      dockerfile: RoomService/Dockerfile
    container_name: roomservice_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=roomservice;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - roomservice_network

  postgres:
    image: postgres:15-alpine
    container_name: roomservice_postgres
    environment:
      POSTGRES_DB: roomservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roomservice"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roomservice_network

volumes:
  postgres_data:
    driver: local

networks:
  roomservice_network:
    driver: bridge